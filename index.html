<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wird geladen...</title>
    <script>
        // 1. Browsersprache auslesen (z.B. "de-DE" oder "en-US") und die ersten zwei Buchstaben nehmen ("de" oder "en")
        const userLang = (navigator.language || navigator.userLanguage).substring(0, 2);

        // 2. Prüfen und weiterleiten
        if (userLang === 'de') {
            window.location.href = 'de/index.html';
        } else {
            // Standardmäßig auf Englisch leiten, falls die Sprache nicht Deutsch ist
            window.location.href = 'en/index.html';
        }
    </script>
</head>
<body>
    <!-- Falls JavaScript im Browser deaktiviert ist, sieht der Nutzer diese Links als Fallback -->
    <p>Bitte wählen Sie Ihre Sprache / Please choose your language:</p>
    <ul>
        <li><a href="de/index.html">Deutsch</a></li>
        <li><a href="en/index.html">English</a></li>
    </ul>
</body>
</html>
